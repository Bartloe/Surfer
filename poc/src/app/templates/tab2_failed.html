<!DOCTYPE html>
<html>
<head>
    <title>Mislukte scrapes</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Mislukte scrapes</h1>
        <div class="tabs">
            <a href="/">Dashboard</a>
            <a href="/tab1">Relevante resultaten</a>
            <a href="/tab2">Mislukte scrapes</a>
            <a href="/profiles">Smaakprofielen</a>
        </div>
        <p>Actief profiel: {{ active_profile.name if active_profile else 'Geen' }}</p>

        <div style="margin-bottom: 10px;">
            <button id="selectAllBtn">Selecteer alles</button>
            <button id="deselectAllBtn">Deselecteer alles</button>
            <button id="exportBtn">Export naar URL-lijst</button>
            <button id="seenBtn">Gezien</button>
        </div>

        <table border="1" cellpadding="5">
            <thead>
                <tr>
                    <th><input type="checkbox" id="selectAllHeader"></th>
                    <th>URL</th>
                    <th>Reden</th>
                    <th>Engine</th>
                </tr>
            </thead>
            <tbody>
                {% for f in failed %}
                <tr>
                    <td><input type="checkbox" class="row-checkbox" value="{{ f.id }}"></td>
                    <td><a href="{{ f.url }}" target="_blank">{{ f.url[:50] }}...</a></td>
                    <td>{{ f.reason }}</td>
                    <td>{{ f.engine }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <p id="message"></p>
    </div>

    <script>
        // Selecteer/deselecteer alles
        document.getElementById('selectAllHeader').addEventListener('change', function() {
            const checked = this.checked;
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
        });
        document.getElementById('selectAllBtn').addEventListener('click', function() {
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = true);
        });
        document.getElementById('deselectAllBtn').addEventListener('click', function() {
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = false);
        });

        function getSelectedIds() {
            const ids = [];
            document.querySelectorAll('.row-checkbox:checked').forEach(cb => ids.push(parseInt(cb.value)));
            return ids;
        }

        function sendAction(url, table) {
            const ids = getSelectedIds();
            if (ids.length === 0) {
                document.getElementById('message').innerText = 'Selecteer eerst minstens één item.';
                return;
            }
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: ids, table: table })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('message').innerText = data.message || 'Actie voltooid.';
                if (url.includes('mark-seen')) {
                    location.reload();
                }
            })
            .catch(err => {
                document.getElementById('message').innerText = 'Fout: ' + err;
            });
        }

        document.getElementById('exportBtn').addEventListener('click', function() {
            sendAction('/api/export-urls', 'failed_scrapes');
        });
        document.getElementById('seenBtn').addEventListener('click', function() {
            sendAction('/api/mark-seen', 'failed_scrapes');
        });
    </script>
</body>
</html>
